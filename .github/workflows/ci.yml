name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build -p fxrank --no-default-features --features rust     # slim-build gate compiles
      - run: cargo build -p fxrank --no-default-features --features ts       # slim TS-only build
      - run: cargo build -p fxrank --no-default-features --features python   # slim Python-only build
      - run: cargo build -p fxrank --no-default-features                     # no-frontend build still compiles
      - run: cargo run -p fxrank -- scan crates/ > /dev/null                 # dogfood: tool runs over its own source
      - run: cargo run -p fxrank -- scan crates/fxrank-lang-ts/tests/fixtures > /dev/null       # dogfood: TS frontend runs over committed fixtures
      - run: cargo run -p fxrank -- scan crates/fxrank-lang-python/tests/fixtures/dogfood.py --include-tests > /dev/null  # dogfood: Python frontend scores the representative fixture
