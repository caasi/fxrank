[package]
name = "fxrank"
edition.workspace = true
version.workspace = true
[[bin]]
name = "fxrank"
path = "src/main.rs"
[dependencies]
fxrank-core = { path = "../fxrank-core" }
fxrank-lang-rust = { path = "../fxrank-lang-rust", optional = true }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
[features]
default = ["rust"]
rust = ["dep:fxrank-lang-rust"]
[dev-dependencies]
assert_cmd = "2"
predicates = "3"
[lints]
workspace = true
